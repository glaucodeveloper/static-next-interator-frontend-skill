<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Exemplo de mensagens globais</title>
</head>
<body>
  <main id="app">
    <button
      type="button"
      data-source-id="topbar"
      data-message="navigate"
      data-route="favorites"
    >
      Favoritos
    </button>

    <button
      type="button"
      data-source-id="listing"
      data-message="toggleFavorite"
      data-value="apt-204"
    >
      Favoritar imovel
    </button>

    <output id="last-message" aria-live="polite">nenhuma mensagem</output>
  </main>

  <script src="./module.js"></script>
</body>
</html>
